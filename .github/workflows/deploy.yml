name: Deploy

on:
  push:
    branches:
      - "main"

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU (for multi-arch builds)
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Prepare image tags
        id: prepare-tags
        run: |
          # GHCR tags (owner/rabbithole)
          GHCR_BASE="ghcr.io/${{ github.repository_owner }}/rabbithole"
          GHCR_TAGS="${GHCR_BASE}:${{ github.sha }}"
          if [ "${GITHUB_REF##*/}" = "main" ]; then
            GHCR_TAGS="${GHCR_TAGS},${GHCR_BASE}:latest"
          fi
          echo "GHCR_TAGS=$GHCR_TAGS" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry (GHCR)
        # Only attempt login on push events (avoid referencing `secrets` in the `if` expression
        # which can cause validation errors in some parsers).
        if: ${{ github.event_name == 'push' }}
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and (optionally) push image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: ${{ env.GHCR_TAGS }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/rabbithole:cache
          cache-to: type=inline

      - name: Show built image info
        if: ${{ always() }}
        run: |
          echo "GHCR_TAGS=${GHCR_TAGS:-(not set)}"

  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Tailscale setup
        uses: tailscale/github-action@v4.1.1
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          ping: p1.tail37b43f.ts.net
          tags: tag:rabbithole

      - name: Begin rollout
        run: |
          curl -H "Authorization: Bearer mytoken" p1.tail37b43f.ts.net:80:8080/v1/update
