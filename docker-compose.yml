services:
  builder:
    build:
      context: .
      target: builder
    volumes:
      - ./pages:/app/pages
      - ./src:/app/src
      - ./dist:/app/dist
      - /app/.venv
    command: >
      sh -c "uv run watchmedo shell-command
      --patterns='*.py;*.md;*.txt;*.html'
      --ignore-patterns='__pycache__'
      --recursive
      --wait
      --command='uv run rabbithole build -p pages -d dist'"
    environment:
      - PYTHONUNBUFFERED=1
    stdin_open: true
    tty: true

  nginx:
    image: nginx:stable-alpine
    ports:
      - "80:80"
    volumes:
      - ./dist:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - builder
