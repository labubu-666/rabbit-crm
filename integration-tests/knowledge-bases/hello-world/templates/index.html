<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/web{{ css_path }}">
    <title>Hello world!</title>
</head>
<body>
<header>
    Hello world!
</header>
<article>
    {% if articles %}
    <h2>Articles</h2>
    <ul>
    {% for article in articles %}
        <li><a href="/web/{{ article.path }}">{{ article.title }}</a></li>
    {% endfor %}
    </ul>
    {% endif %}
</article>
<nav>
    <a href="?offset={{ offset - limit }}&limit={{ limit }}" {% if not has_prev %}disabled{% endif %}>← Previous</a>
    <span>Page {{ (offset // limit) + 1 }} of {{ ((total_count + limit - 1) // limit) }}</span>
    <a href="?offset={{ offset + limit }}&limit={{ limit }}" {% if not has_next %}disabled{% endif %}>Next →</a>
</nav>
<footer>
    v0.0.0
</footer>
</body>
</html>
