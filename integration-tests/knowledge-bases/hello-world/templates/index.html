<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/web{{ css_path }}">
    <title>Hello world!</title>
</head>
<body>
<header>
    Hello world!
</header>
<article>
    {% if articles %}
    <h2>Articles</h2>
    <ul>
    {% for article in articles %}
        <li><a href="/web/{{ article.path }}">{{ article.title }}</a></li>
    {% endfor %}
    </ul>

    <nav>
        <a href="?page={{ page - 1 }}&limit={{ limit }}" {% if not has_prev %}disabled{% endif %}>← Previous</a>

        <span>
            {% for page_num in range(1, total_pages + 1) %}
                {% if page_num == page %}
                    <strong>{{ page_num }}</strong>
                {% else %}
                    <a href="?page={{ page_num }}&limit={{ limit }}">{{ page_num }}</a>
                {% endif %}
            {% endfor %}
        </span>

        <a href="?page={{ page + 1 }}&limit={{ limit }}" {% if not has_next %}disabled{% endif %}>Next →</a>
    </nav>
    {% endif %}
</article>
<footer>
    v0.0.0
</footer>
</body>
</html>
