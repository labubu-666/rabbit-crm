server {
    listen 80;
    server_name _;

    location /web/ {
        alias /usr/share/nginx/html/;
        index index.html;
        autoindex on;

        try_files $uri $uri/ =404;
    }

    # Normalize '/web' (no trailing slash) to '/web/' to avoid accidental redirects to /web/web
    location = /web {
        return 301 /web/;
    }

    # Redirect any request that does NOT start with '/web' to '/web<original_request_uri>'
    # This preserves the path and the query string. Use 302 for testing; change to 301 for permanent.
    location ~ ^/(?!web(?:/|$)).* {
        return 302 /web$request_uri;
    }
}